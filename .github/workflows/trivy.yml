name: Trivy Vulnerability Scan

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  trivy-server:
    name: Trivy Scan - Server
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (server)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: server/
          format: sarif
          output: trivy-server-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload server Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-server-results.sarif
          category: trivy-server

  trivy-app:
    name: Trivy Scan - App
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (app)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          format: sarif
          output: trivy-app-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload app Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-app-results.sarif
          category: trivy-app
