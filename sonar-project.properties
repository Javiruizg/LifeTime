sonar.projectKey=Javiruizg_LifeTime
sonar.organization=javiruizg
sonar.projectName=LifeTime
sonar.sourceEncoding=UTF-8

sonar.modules=server,app

# ─── Server module ───────────────────────────────────────
server.sonar.projectName=LifeTime Server
server.sonar.projectBaseDir=server
server.sonar.sources=src
server.sonar.tests=src
server.sonar.test.inclusions=src/**/*.test.ts
server.sonar.exclusions=src/**/*.test.ts,node_modules/**,dist/**
server.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ─── App module ──────────────────────────────────────────
app.sonar.projectName=LifeTime App
app.sonar.projectBaseDir=app
app.sonar.sources=.
app.sonar.tests=.
app.sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
app.sonar.exclusions=**/*.test.ts,**/*.test.tsx,node_modules/**,.expo/**,ios/**,android/**
app.sonar.javascript.lcov.reportPaths=coverage/lcov.info